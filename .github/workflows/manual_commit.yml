name: Manual Contribution

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Update Contribution Log
        run: |
          echo "Manual action triggered on $(date)" >> manual_log.txt
          git config user.name "Tehseen-webdeveloper"
          git config user.email "tahseen.test@gmail.com"
          git add manual_log.txt
          git commit -m "chore: manual contribution"
          git push